services:
  - type: web
    name: sves-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false

# Note: Frontend is deployed separately via Vercel.
# Connect the GitHub repo to Vercel at https://vercel.com and it will
# auto-deploy on every push to main using the settings in frontend/vercel.json.
# Set REACT_APP_BACKEND_URL in the Vercel project environment variables
# to point to the Render backend URL (e.g. https://sves-backend.onrender.com).
