version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sves_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-sves}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-sves_password}
      POSTGRES_DB: ${PG_DATABASE:-sves_db}
    ports:
      - '${PG_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER:-sves} -d ${PG_DATABASE:-sves_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sves_network

  redis:
    image: redis:7-alpine
    container_name: sves_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-redis_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - sves_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sves_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DATABASE_URL: postgresql://${PG_USER:-sves}:${PG_PASSWORD:-sves_password}@postgres:5432/${PG_DATABASE:-sves_db}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-sves}
      PG_PASSWORD: ${PG_PASSWORD:-sves_password}
      PG_DATABASE: ${PG_DATABASE:-sves_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_jwt_secret_min_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_refresh_secret_min_32_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SENSOR_API_KEY_HASH: ${SENSOR_API_KEY_HASH:-}
    ports:
      - '${PORT:-5000}:5000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sves_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api/v1}
        REACT_APP_WS_URL: ${REACT_APP_WS_URL:-http://localhost:5000}
        BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://localhost:5000 ws://localhost:5000}
    container_name: sves_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - sves_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  sves_network:
    driver: bridge
