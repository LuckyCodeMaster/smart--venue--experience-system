version: '3.8'

services:
  backend:
    build: ./backend
    container_name: smart-venue-backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=development
    volumes:
      - ./backend/src:/app/src
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: smart-venue-frontend
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped
